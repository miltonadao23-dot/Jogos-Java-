<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nostalgia Hub: Bounce & Watchmen</title>
    <!-- CORREÇÃO 1: Link oficial do motor Java (CheerpJ 3.0) -->
    <script src="https://leaningtech.com"></script>
    <style>
        body { background: #000; color: #f39c12; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 20px; }
        .game-selector { margin: 20px; }
        .btn { background: #f39c12; border: none; padding: 15px 25px; cursor: pointer; font-weight: bold; margin: 10px; border-radius: 5px; text-transform: uppercase; transition: 0.3s; }
        .btn:hover { background: #e67e22; transform: scale(1.05); }
        #display { width: 320px; height: 480px; background: #222; margin: 20px auto; border: 5px solid #333; border-radius: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .controls-info { color: #888; font-size: 0.9em; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>JOGOS JAVA ONLINE</h1>
    
    <div class="game-selector">
        <!-- IMPORTANTE: O nome aqui deve ser IGUAL ao nome do ficheiro (ex: Bounce.jar ou bounce.jar) -->
        <button class="btn" onclick="playGame('Bounce.jar')">JOGAR BOUNCE</button>
        <button class="btn" onclick="playGame('watchmen.jar')">JOGAR WATCHMEN</button>
    </div>

    <div id="display">
        <p id="status-msg">Clica num botão para carregar o jogo</p>
    </div>

    <div class="controls-info">
        <p>Utiliza as <b>setas do teclado</b> e o <b>Enter</b> para jogar.</p>
    </div>

    <script>
    async function playGame(jarFile) {
        const display = document.getElementById('display');
        display.innerHTML = "<p style='padding-top:200px;'>A carregar " + jarFile + "...</p>";
        
        try {
            // Inicializa o motor Java v3.0
            await cheerpjInit();
            
            // Cria o ecrã e adiciona ao display
            const graphicalDisplay = cheerpjCreateDisplay(320, 480);
            display.innerHTML = ""; 
            display.appendChild(graphicalDisplay);
            
            // CORREÇÃO PARA GITHUB: 
            // Usamos window.location.pathname para garantir que ele procura na pasta do repositório
            const jarPath = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/')) + "/" + jarFile;
            
            await cheerpjRunJar(jarPath);
            
        } catch (e) {
            console.error("Erro ao carregar:", e);
            display.innerHTML = "<div style='color:red; padding-top:150px;'>ERRO:<br>Não foi possível carregar " + jarFile + ".<br><small>Verifica se o ficheiro está no GitHub com este nome exato.</small></div>";
        }
    }
</script>


</body>
</html>
